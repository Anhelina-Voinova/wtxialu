<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planer Ani i Oliwiera v13</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --container-bg: #ffffff; --primary: #8e44ad;
            --ania-color: #ff7675; --oliwier-color: #74b9ff; --text: #2d3436;
            --border: #dfe6e9; --radius: 20px; --status-nie: #ffeaa7;
            --status-trwa: #81ecec; --status-zak: #55efc4;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; min-height: 100vh; }
        
        #loginScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #f0f2f5 0%, #dcdde1 100%); display: flex; justify-content: center; align-items: center; z-index: 4000; }
        .login-card { background: white; padding: 40px; border-radius: var(--radius); box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .user-btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 20px; color: white; }

        /* UKŁAD GŁÓWNY */
        .app-container { 
            display: none; 
            max-width: 1200px; 
            margin: 0 auto; 
            gap: 20px; 
        }

        /* Widok Laptop (Szeroki) */
        @media (min-width: 901px) {
            .app-container { display: grid; grid-template-columns: 1fr 420px; }
            .stats-bar { grid-column: span 2; }
        }

        /* Widok Telefon (Wąski) */
        @media (max-width: 900px) {
            .app-container { display: flex; flex-direction: column; }
            .day-cell { aspect-ratio: 1; }
        }

        /* Statystyki */
        .stats-bar { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 10px; }
        .stat-item { flex: 1; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; background: white; border-bottom: 4px solid #ddd; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-nie { border-color: #f1c40f; } .stat-trwa { border-color: #3498db; } .stat-zak { border-color: #2ecc71; }
        .stat-count { font-size: 22px; display: block; }

        /* Kalendarz i Zadania */
        .white-box { background: white; padding: 20px; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day-cell { border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 60px; font-weight: 600; }
        .day-cell.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Karty zadań */
        .task-card { background: #f9f9f9; padding: 15px; margin-bottom: 12px; border-radius: 15px; border-left: 6px solid var(--primary); position: relative; }
        .task-actions { position: absolute; right: 10px; top: 10px; }
        .task-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }

        /* Formularz */
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Overlay (Okno ze statystykami) */
        #statusOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 5000; padding: 20px; overflow-y: auto; }
        .overlay-content { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: var(--radius); position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; }

        .logout-btn { position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 8px 15px; border-radius: 20px; background: #333; color: white; border: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>Cześć! Kto planuje?</h1>
            <button class="user-btn" style="background:var(--ania-color)" onclick="login('Ania')">Ania</button>
            <button class="user-btn" style="background:var(--oliwier-color)" onclick="login('Oliwier')">Oliwier</button>
        </div>
    </div>

    <div id="statusOverlay">
        <div class="overlay-content">
            <span class="close-btn" onclick="closeOverlay()">×</span>
            <h2 id="overlayTitle">Zadania</h2>
            <div id="overlayTasks"></div>
        </div>
    </div>

    <button class="logout-btn" onclick="location.reload()">Wyloguj</button>

    <div class="app-container" id="mainApp">
        <div class="stats-bar">
            <div class="stat-item stat-nie" onclick="openStatusView('nie')">
                <span class="stat-count" id="countNie">0</span><small>Nie zaczęte</small>
            </div>
            <div class="stat-item stat-trwa" onclick="openStatusView('trwa')">
                <span class="stat-count" id="countTrwa">0</span><small>W trakcie</small>
            </div>
            <div class="stat-item stat-zak" onclick="openStatusView('zak')">
                <span class="stat-count" id="countZak">0</span><small>Gotowe</small>
            </div>
        </div>

        <div class="calendar-part white-box">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <button onclick="changeMonth(-1)">Poprzedni</button>
                <h2 id="monthDisplay" style="margin:0"></h2>
                <button onclick="changeMonth(1)">Następny</button>
            </div>
            <div id="calendarGrid" class="days-grid"></div>
        </div>

        <div class="tasks-part white-box">
            <h2 id="viewDateTitle">Zadania</h2>
            <div id="taskList"></div>
            <hr style="margin: 25px 0; opacity: 0.2;">
            <h3>+ Dodaj zadanie</h3>
            <input type="text" id="tTitle" placeholder="Tytuł...">
            <div style="display: flex; gap: 8px;">
                <input type="time" id="tTime">
                <input type="time" id="tEndTime">
            </div>
            <textarea id="tDesc" placeholder="Szczegóły..." rows="2"></textarea>
            <div style="margin-bottom: 15px; display: flex; justify-content: space-around;">
                <label><input type="checkbox" id="pAnia"> Ania</label>
                <label><input type="checkbox" id="pOliwier"> Oliwier</label>
            </div>
            <select id="tStatus">
                <option value="nie">Nie zaczęte</option>
                <option value="trwa">W trakcie</option>
                <option value="zak">Zakończone</option>
            </select>
            <button class="btn-save" onclick="handleSubmit()">Zapisz Wspólnie</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4p-us6hOvGp83VOd-fBOGAXsv41wJ8Is",
            authDomain: "kalendarz-ff379.firebaseapp.com",
            projectId: "kalendarz-ff379",
            storageBucket: "kalendarz-ff379.firebasestorage.app",
            messagingSenderId: "233798983321",
            appId: "1:233798983321:web:f7cfe4d2e179baa87a2208"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = "", selectedDate = new Date(), viewDate = new Date(), tasks = [];

        function login(user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = (window.innerWidth > 900) ? 'grid' : 'flex';
            document.getElementById('pAnia').checked = (user === 'Ania');
            document.getElementById('pOliwier').checked = (user === 'Oliwier');
            startSync();
        }

        function startSync() {
            db.collection("tasks").onSnapshot(snap => {
                tasks = [];
                snap.forEach(doc => tasks.push({id: doc.id, ...doc.data()}));
                renderAll();
            });
        }

        function formatDate(d) { return d.toISOString().split('T')[0]; }

        function renderAll() {
            renderCalendar();
            renderTasks();
            document.getElementById('countNie').innerText = tasks.filter(t => t.status === 'nie').length;
            document.getElementById('countTrwa').innerText = tasks.filter(t => t.status === 'trwa').length;
            document.getElementById('countZak').innerText = tasks.filter(t => t.status === 'zak').length;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const m = viewDate.getMonth(), y = viewDate.getFullYear();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('monthDisplay').innerText = `${names[m]} ${y}`;
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const daysCount = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysCount; d++) {
                const date = new Date(y, m, d);
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (formatDate(date) === formatDate(selectedDate) ? ' active' : '');
                cell.innerText = d;
                cell.onclick = () => { selectedDate = date; renderAll(); };
                grid.appendChild(cell);
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList'); list.innerHTML = '';
            document.getElementById('viewDateTitle').innerText = selectedDate.toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            const dayTasks = tasks.filter(t => t.date === formatDate(selectedDate));
            if(dayTasks.length === 0) list.innerHTML = '<p style="color:#999">Brak zadań</p>';
            dayTasks.forEach(t => list.appendChild(createCard(t)));
        }

        function createCard(t) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.innerHTML = `
                <div class="task-actions"><button class="task-btn" onclick="deleteTask('${t.id}')">🗑️</button></div>
                <strong>${t.time || ''} ${t.title}</strong><br>
                <small>${t.who.join(', ')} | ${t.status}</small>
            `;
            return div;
        }

        function openStatusView(s) {
            const container = document.getElementById('overlayTasks');
            container.innerHTML = '';
            const filtered = tasks.filter(t => t.status === s);
            document.getElementById('overlayTitle').innerText = s === 'nie' ? 'Nie zaczęte' : s === 'trwa' ? 'W trakcie' : 'Zakończone';
            filtered.forEach(t => container.appendChild(createCard(t)));
            document.getElementById('statusOverlay').style.display = 'block';
        }

        function closeOverlay() { document.getElementById('statusOverlay').style.display = 'none'; }

        async function handleSubmit() {
            const title = document.getElementById('tTitle').value;
            if(!title) return alert("Wpisz tytuł!");
            const who = [];
            if(document.getElementById('pAnia').checked) who.push('Ania');
            if(document.getElementById('pOliwier').checked) who.push('Oliwier');
            await db.collection("tasks").add({
                title, date: formatDate(selectedDate),
                time: document.getElementById('tTime').value,
                endTime: document.getElementById('tEndTime').value,
                desc: document.getElementById('tDesc').value,
                who, status: document.getElementById('tStatus').value
            });
            document.getElementById('tTitle').value = '';
        }

        async function deleteTask(id) { if(confirm("Usunąć?")) await db.collection("tasks").doc(id).delete(); }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderAll(); }
    </script>
</body>
</html>
