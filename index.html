<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planer Ani i Oliwiera v12</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --primary: #8e44ad; --ania-color: #ff7675;
            --oliwier-color: #74b9ff; --text: #2d3436; --border: #dfe6e9;
        }
        
        /* Reset i baza */
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: var(--text); }

        /* Ekran logowania */
        #loginScreen { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { text-align: center; width: 90%; max-width: 400px; }
        .user-btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px; font-weight: bold; font-size: 22px; color: white; cursor: pointer; }

        /* Główny układ - wymuszamy blokowość na małych ekranach */
        .app-container { 
            display: none; 
            max-width: 1200px; 
            margin: 0 auto; 
            flex-direction: column; /* Domyślnie na komórkę: góra-dół */
            gap: 20px; 
        }

        /* Na laptopie wracamy do dwóch kolumn */
        @media (min-width: 900px) {
            .app-container { display: flex; flex-direction: row; flex-wrap: wrap; }
            .stats-bar { width: 100%; }
            .calendar-part { flex: 1; }
            .tasks-part { width: 420px; }
        }

        /* Elementy interfejsu */
        .stats-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .stat-item { flex: 1; background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-count { display: block; font-size: 20px; font-weight: bold; }

        .calendar-part, .tasks-part { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day-cell { border: 1px solid var(--border); border-radius: 10px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .day-cell.active { background: var(--primary); color: white; }

        .task-card { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 12px; border-left: 5px solid var(--primary); position: relative; }
        
        /* Formularz - czcionka 16px to mus na iPhone */
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        .logout-btn { position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 5px 12px; border-radius: 10px; background: rgba(0,0,0,0.5); color: white; border: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>Kto wchodzi?</h1>
            <button class="user-btn" style="background:var(--ania-color)" onclick="login('Ania')">Ania</button>
            <button class="user-btn" style="background:var(--oliwier-color)" onclick="login('Oliwier')">Oliwier</button>
        </div>
    </div>

    <button class="logout-btn" onclick="location.reload()">Wyloguj</button>

    <div class="app-container" id="mainApp">
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-count" id="countNie">0</span><small>Czeka</small></div>
            <div class="stat-item"><span class="stat-count" id="countTrwa">0</span><small>W trakcie</small></div>
            <div class="stat-item"><span class="stat-count" id="countZak">0</span><small>Gotowe</small></div>
        </div>

        <div class="calendar-part">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <button onclick="changeMonth(-1)">←</button>
                <h3 id="monthDisplay" style="margin:0"></h3>
                <button onclick="changeMonth(1)">→</button>
            </div>
            <div id="calendarGrid" class="days-grid"></div>
        </div>

        <div class="tasks-part">
            <h3 id="viewDateTitle">Zadania</h3>
            <div id="taskList"></div>
            <hr>
            <h4>+ Nowe zadanie</h4>
            <input type="text" id="tTitle" placeholder="Co robimy?">
            <div style="display: flex; gap: 5px;">
                <input type="time" id="tTime">
                <input type="time" id="tEndTime">
            </div>
            <textarea id="tDesc" placeholder="Szczegóły..." rows="2"></textarea>
            <div style="margin: 10px 0; display:flex; justify-content: center; gap: 15px;">
                <label><input type="checkbox" id="pAnia"> Ania</label>
                <label><input type="checkbox" id="pOliwier"> Oliwier</label>
            </div>
            <select id="tStatus">
                <option value="nie">Czeka</option>
                <option value="trwa">W trakcie</option>
                <option value="zak">Gotowe</option>
            </select>
            <button class="btn-save" onclick="handleSubmit()">ZAPISZ</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4p-us6hOvGp83VOd-fBOGAXsv41wJ8Is",
            authDomain: "kalendarz-ff379.firebaseapp.com",
            projectId: "kalendarz-ff379",
            storageBucket: "kalendarz-ff379.firebasestorage.app",
            messagingSenderId: "233798983321",
            appId: "1:233798983321:web:f7cfe4d2e179baa87a2208"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = "";
        let selectedDate = new Date();
        let viewDate = new Date();
        let tasks = [];

        function login(user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('pAnia').checked = (user === 'Ania');
            document.getElementById('pOliwier').checked = (user === 'Oliwier');
            startSync();
        }

        function startSync() {
            db.collection("tasks").onSnapshot(snap => {
                tasks = [];
                snap.forEach(doc => tasks.push({id: doc.id, ...doc.data()}));
                renderAll();
            });
        }

        function formatDate(d) { return d.toISOString().split('T')[0]; }

        function renderAll() {
            renderCalendar();
            renderTasks();
            document.getElementById('countNie').innerText = tasks.filter(t => t.status === 'nie').length;
            document.getElementById('countTrwa').innerText = tasks.filter(t => t.status === 'trwa').length;
            document.getElementById('countZak').innerText = tasks.filter(t => t.status === 'zak').length;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const m = viewDate.getMonth(), y = viewDate.getFullYear();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('monthDisplay').innerText = `${names[m]} ${y}`;
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const date = new Date(y, m, d);
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (formatDate(date) === formatDate(selectedDate) ? ' active' : '');
                cell.innerText = d;
                cell.onclick = () => { selectedDate = date; renderAll(); };
                grid.appendChild(cell);
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList'); list.innerHTML = '';
            document.getElementById('viewDateTitle').innerText = selectedDate.toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            tasks.filter(t => t.date === formatDate(selectedDate)).forEach(t => {
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<strong>${t.time || ''} ${t.title}</strong><br><small>${t.who.join(', ')}</small>
                <button onclick="deleteTask('${t.id}')" style="float:right; border:none; background:none;">🗑️</button>`;
                list.appendChild(div);
            });
        }

        async function handleSubmit() {
            const title = document.getElementById('tTitle').value;
            if(!title) return;
            const who = [];
            if(document.getElementById('pAnia').checked) who.push('Ania');
            if(document.getElementById('pOliwier').checked) who.push('Oliwier');
            await db.collection("tasks").add({
                title, date: formatDate(selectedDate),
                time: document.getElementById('tTime').value,
                who, status: document.getElementById('tStatus').value
            });
            document.getElementById('tTitle').value = '';
        }

        async function deleteTask(id) { if(confirm("Usunąć?")) await db.collection("tasks").doc(id).delete(); }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderAll(); }
    </script>
</body>
</html>
