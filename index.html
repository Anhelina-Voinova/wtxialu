<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Ani i Oliwiera v11 - Cloud</title>
    <style>
        /* Twoje style CSS zostają bez zmian */
        :root {
            --bg-color: #f0f2f5; --container-bg: #ffffff; --primary: #8e44ad;
            --ania-color: #ff7675; --oliwier-color: #74b9ff; --text: #2d3436;
            --border: #dfe6e9; --radius: 20px; --status-nie: #ffeaa7;
            --status-trwa: #81ecec; --status-zak: #55efc4;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #loginScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #f0f2f5 0%, #dcdde1 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 50px; border-radius: var(--radius); box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .user-btn { padding: 15px 40px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 20px; color: white; transition: 0.3s; }
        #statusOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 3000; padding: 40px 20px; overflow-y: auto; }
        .overlay-content { max-width: 800px; margin: 0 auto; background: var(--bg-color); padding: 30px; border-radius: var(--radius); position: relative; }
        .close-overlay { position: absolute; right: 25px; top: 20px; font-size: 30px; cursor: pointer; color: #666; }
        .app-container { display: none; grid-template-columns: 1fr 420px; gap: 25px; width: 95%; max-width: 1200px; background: white; padding: 30px; border-radius: var(--radius); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } }
        .stats-bar { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 25px; grid-column: span 2; }
        .stat-item { flex: 1; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; background: white; border-bottom: 4px solid #ddd; cursor: pointer; transition: 0.3s; }
        .stat-nie { border-color: #f1c40f; } .stat-trwa { border-color: #3498db; } .stat-zak { border-color: #2ecc71; }
        .stat-count { font-size: 24px; display: block; color: var(--text); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { aspect-ratio: 1.1; border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-weight: 600; }
        .day-cell.active { background: var(--primary); color: white; }
        .task-dots { display: flex; gap: 2px; margin-top: 5px; }
        .task-dot { width: 6px; height: 6px; border-radius: 50%; }
        .task-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #8e44ad; position: relative; }
        .actions { position: absolute; right: 15px; top: 15px; display: flex; gap: 8px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; opacity: 0.6; }
        .status-badge { font-size: 10px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-right: 5px; }
        .tag-Ania { background: #ffecec; color: var(--ania-color); }
        .tag-Oliwier { background: #eaf4ff; color: var(--oliwier-color); }
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .form-box input, .form-box textarea, .form-box select { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .color-picker { display: flex; gap: 10px; margin-bottom: 15px; }
        .color-opt { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-opt.selected { border-color: #333; transform: scale(1.2); }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .logout-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 30px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>Cześć! Kto planuje?</h1>
            <button class="user-btn" style="background:var(--ania-color)" onclick="login('Ania')">Ania</button>
            <button class="user-btn" style="background:var(--oliwier-color)" onclick="login('Oliwier')">Oliwier</button>
        </div>
    </div>

    <div id="statusOverlay">
        <div class="overlay-content">
            <span class="close-overlay" onclick="closeOverlay()">×</span>
            <h2 id="overlayTitle">Zadania</h2>
            <div id="overlayTasks"></div>
        </div>
    </div>

    <button class="logout-btn" onclick="location.reload()">Wyloguj</button>

    <div class="app-container" id="mainApp">
        <div class="stats-bar">
            <div class="stat-item stat-nie" onclick="openStatusView('nie')">
                <span class="stat-count" id="countNie">0</span><span class="stat-label">Nie zaczęte</span>
            </div>
            <div class="stat-item stat-trwa" onclick="openStatusView('trwa')">
                <span class="stat-count" id="countTrwa">0</span><span class="stat-label">W trakcie</span>
            </div>
            <div class="stat-item stat-zak" onclick="openStatusView('zak')">
                <span class="stat-count" id="countZak">0</span><span class="stat-label">Zakończone</span>
            </div>
        </div>

        <div class="calendar-part">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">Poprzedni</button>
                <h2 id="monthDisplay"></h2>
                <button onclick="changeMonth(1)">Następny</button>
            </div>
            <div id="calendarGrid" class="days-grid"></div>
        </div>

        <div class="tasks-part">
            <h2 id="viewDateTitle">Zadania</h2>
            <div id="taskList"></div>
            <div class="form-box">
                <h4 id="formTitle">Nowe zadanie</h4>
                <input type="text" id="tTitle" placeholder="Co robimy?">
                <div style="display: flex; gap: 8px;">
                    <input type="time" id="tTime">
                    <input type="time" id="tEndTime">
                </div>
                <input type="text" id="tLoc" placeholder="Gdzie?">
                <textarea id="tDesc" placeholder="Szczegóły..." rows="2"></textarea>
                <div class="color-picker" id="colorPicker">
                    <div class="color-opt selected" style="background:#8e44ad" data-color="#8e44ad"></div>
                    <div class="color-opt" style="background:#e67e22" data-color="#e67e22"></div>
                    <div class="color-opt" style="background:#27ae60" data-color="#27ae60"></div>
                    <div class="color-opt" style="background:#2980b9" data-color="#2980b9"></div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label><input type="checkbox" id="pAnia"> Ania</label>
                    <label><input type="checkbox" id="pOliwier"> Oliwier</label>
                </div>
                <select id="tStatus">
                    <option value="nie">Nie zaczęte</option>
                    <option value="trwa">W trakcie</option>
                    <option value="zak">Zakończone</option>
                </select>
                <button class="btn-save" id="submitBtn" onclick="handleSubmit()">Zapisz Wspólnie</button>
                <button id="cancelBtn" onclick="cancelEdit()" style="display:none; width:100%; background:#ccc; margin-top:5px;">Anuluj</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD4p-us6hOvGp83VOd-fBOGAXsv41wJ8Is",
          authDomain: "kalendarz-ff379.firebaseapp.com",
          projectId: "kalendarz-ff379",
          storageBucket: "kalendarz-ff379.firebasestorage.app",
          messagingSenderId: "233798983321",
          appId: "1:233798983321:web:f7cfe4d2e179baa87a2208"
        };
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "TWÓJ_PROJEKT.firebaseapp.com",
            projectId: "TWÓJ_ID",
            storageBucket: "TWÓJ_PROJEKT.appspot.com",
            messagingSenderId: "NUMER",
            appId: "ID_APKI"
        };
        // -------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = "";
        let selectedDate = new Date();
        let viewDate = new Date();
        let tasks = [];
        let editId = null;
        let selectedColor = "#8e44ad";

        function login(user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'grid';
            resetForm();
            startSync();
        }

        // SYNCHRONIZACJA Z CHMURĄ GOOGLE
        function startSync() {
            db.collection("tasks").onSnapshot((snapshot) => {
                tasks = [];
                snapshot.forEach((doc) => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                renderAll();
            });
        }

        function formatDate(date) { return date.toISOString().split('T')[0]; }
        function renderAll() { renderCalendar(); renderTasks(); updateStats(); }

        function updateStats() {
            document.getElementById('countNie').innerText = tasks.filter(t => t.status === 'nie').length;
            document.getElementById('countTrwa').innerText = tasks.filter(t => t.status === 'trwa').length;
            document.getElementById('countZak').innerText = tasks.filter(t => t.status === 'zak').length;
        }

        async function handleSubmit() {
            const title = document.getElementById('tTitle').value;
            if(!title) return alert("Wpisz tytuł!");

            const who = [];
            if(document.getElementById('pAnia').checked) who.push('Ania');
            if(document.getElementById('pOliwier').checked) who.push('Oliwier');

            const taskData = {
                date: formatDate(selectedDate),
                time: document.getElementById('tTime').value,
                endTime: document.getElementById('tEndTime').value,
                title: title,
                location: document.getElementById('tLoc').value,
                desc: document.getElementById('tDesc').value,
                status: document.getElementById('tStatus').value,
                color: selectedColor,
                who: who,
                updatedAt: new Date().getTime()
            };

            if(editId) {
                await db.collection("tasks").doc(editId).update(taskData);
            } else {
                await db.collection("tasks").add(taskData);
            }
            cancelEdit();
        }

        async function deleteTask(id) {
            if(confirm("Usunąć?")) {
                await db.collection("tasks").doc(id).delete();
            }
        }

        // Pozostałe funkcje renderujące (createTaskCard, renderCalendar itp.) 
        // zostały zoptymalizowane pod dane z Firebase
        
        function createTaskCard(t) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.style.borderLeftColor = t.color;
            const timeRange = t.time ? (t.endTime ? `${t.time} – ${t.endTime}` : t.time) : 'Cały dzień';
            div.innerHTML = `
                <div class="actions">
                    <button class="action-btn" onclick="editTask('${t.id}')">✏️</button>
                    <button class="action-btn" onclick="deleteTask('${t.id}')">🗑️</button>
                </div>
                <small>${t.date} | ${timeRange}</small>
                <div style="font-weight:bold; margin:5px 0">${t.title}</div>
                <div style="margin-top:10px">
                    ${t.who.map(p => `<span class="tag tag-${p}">${p}</span>`).join('')}
                    <span class="status-badge badge-${t.status}">${t.status}</span>
                </div>
            `;
            return div;
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            const dayTasks = tasks.filter(t => t.date === formatDate(selectedDate));
            document.getElementById('viewDateTitle').innerText = selectedDate.toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            dayTasks.forEach(t => list.appendChild(createTaskCard(t)));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const m = viewDate.getMonth(); const y = viewDate.getFullYear();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('monthDisplay').innerText = `${names[m]} ${y}`;
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const daysCount = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysCount; d++) {
                const date = new Date(y, m, d);
                const dateStr = formatDate(date);
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (dateStr === formatDate(selectedDate) ? ' active' : '');
                cell.innerHTML = `<span>${d}</span>`;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                if(dayTasks.length > 0) {
                    const dots = document.createElement('div'); dots.className = 'task-dots';
                    dayTasks.slice(0, 3).forEach(t => {
                        const dot = document.createElement('div'); dot.className = 'task-dot';
                        dot.style.background = t.color; dots.appendChild(dot);
                    });
                    cell.appendChild(dots);
                }
                cell.onclick = () => { selectedDate = date; renderAll(); };
                grid.appendChild(cell);
            }
        }

        function editTask(id) {
            const t = tasks.find(x => x.id === id);
            editId = id;
            document.getElementById('tTitle').value = t.title;
            document.getElementById('tTime').value = t.time;
            document.getElementById('tEndTime').value = t.endTime || '';
            document.getElementById('tStatus').value = t.status;
            document.getElementById('pAnia').checked = t.who.includes('Ania');
            document.getElementById('pOliwier').checked = t.who.includes('Oliwier');
            document.getElementById('cancelBtn').style.display = 'block';
        }

        function resetForm() {
            document.getElementById('tTitle').value = '';
            document.getElementById('pAnia').checked = (currentUser === 'Ania');
            document.getElementById('pOliwier').checked = (currentUser === 'Oliwier');
        }

        function cancelEdit() { editId = null; resetForm(); document.getElementById('cancelBtn').style.display = 'none'; }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderAll(); }
        function openStatusView(s) { /* Analogicznie jak w Twoim kodzie */ }
        function closeOverlay() { document.getElementById('statusOverlay').style.display = 'none'; }
        
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedColor = opt.dataset.color;
            };
        });
    </script>
</body>
</html>
