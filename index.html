<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planer v16 - Naprawiony</title>
    <style>
        :root { --bg: #f0f2f5; --ania: #ff7675; --oliwier: #74b9ff; --purple: #8e44ad; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }

        /* LOGOWANIE */
        #loginScreen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .u-btn { width: 80%; max-width: 300px; padding: 20px; margin: 10px; border: none; border-radius: 15px; color: white; font-size: 20px; font-weight: bold; }

        /* KONTENER GŁÓWNY */
        .main-wrapper { 
            display: none; 
            max-width: 1200px; 
            margin: 0 auto; 
            gap: 20px; 
            padding-top: 50px;
        }

        /* LAPTOP - wymuszamy 2 kolumny */
        @media (min-width: 900px) {
            .main-wrapper.active { display: grid; grid-template-columns: 1fr 400px; }
            .top-stats { grid-column: span 2; }
            .cal-box { min-height: 600px; }
        }

        /* TELEFON - wymuszamy 1 kolumnę */
        @media (max-width: 899px) {
            .main-wrapper.active { display: flex; flex-direction: column; }
        }

        /* STATYSTYKI */
        .top-stats { display: flex; gap: 10px; width: 100%; margin-bottom: 10px; }
        .s-card { flex: 1; background: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-bottom: 5px solid #ddd; }
        .s-num { display: block; font-size: 24px; font-weight: bold; pointer-events: none; }

        /* PUDEŁKA */
        .white-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .d-cell { border: 1px solid #eee; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .d-cell.active { background: var(--purple); color: white; }

        /* FORMULARZ */
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
        .save-btn { background: var(--purple); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* OKNO OVERLAY */
        #ov-back { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000; padding: 20px; }
        .ov-front { background: white; padding: 20px; border-radius: 20px; max-width: 500px; margin: 20px auto; max-height: 80vh; overflow-y: auto; }

        .logout-x { position: fixed; top: 10px; right: 10px; z-index: 500; padding: 5px 10px; background: #333; color: white; border-radius: 5px; font-size: 12px; }
        .t-item { background: #f9f9f9; padding: 10px; margin: 10px 0; border-radius: 10px; border-left: 5px solid var(--purple); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2 style="margin-bottom:20px">Kto wchodzi?</h2>
        <button class="u-btn" style="background:var(--ania)" onclick="start('Ania')">Ania</button>
        <button class="u-btn" style="background:var(--oliwier)" onclick="start('Oliwier')">Oliwier</button>
    </div>

    <button class="logout-x" onclick="location.reload()">Wyloguj</button>

    <div id="ov-back" onclick="if(event.target==this)this.style.display='none'">
        <div class="ov-front">
            <h2 id="ov-t">Lista</h2>
            <div id="ov-l"></div>
            <button onclick="document.getElementById('ov-back').style.display='none'" style="width:100%; padding:10px; margin-top:15px">Zamknij</button>
        </div>
    </div>

    <div class="main-wrapper" id="app">
        <div class="top-stats">
            <div class="s-card" style="border-color:#f1c40f" onclick="showStatus('nie')">
                <span class="s-num" id="s-n">0</span><small>Czeka</small>
            </div>
            <div class="s-card" style="border-color:#3498db" onclick="showStatus('trwa')">
                <span class="s-num" id="s-t">0</span><small>W trakcie</small>
            </div>
            <div class="s-card" style="border-color:#2ecc71" onclick="showStatus('zak')">
                <span class="s-num" id="s-z">0</span><small>Gotowe</small>
            </div>
        </div>

        <div class="white-card cal-box">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <button onclick="moveMonth(-1)" style="padding:5px 15px">←</button>
                <h2 id="month-name"></h2>
                <button onclick="moveMonth(1)" style="padding:5px 15px">→</button>
            </div>
            <div id="calendar" class="grid-7"></div>
        </div>

        <div class="white-card">
            <h2 id="day-label">Zadania</h2>
            <div id="day-tasks"></div>
            <hr style="margin:20px 0; opacity:0.1">
            <h3>+ Nowe</h3>
            <input type="text" id="f-title" placeholder="Co robimy?">
            <div style="display:flex; gap:5px"><input type="time" id="f-s"><input type="time" id="f-e"></div>
            <textarea id="f-desc" placeholder="Szczegóły..."></textarea>
            <div style="display:flex; justify-content: space-around; padding:10px 0">
                <label><input type="checkbox" id="c-ania"> Ania</label>
                <label><input type="checkbox" id="c-oli"> Oliwier</label>
            </div>
            <select id="f-stat">
                <option value="nie">Czeka</option>
                <option value="trwa">W trakcie</option>
                <option value="zak">Gotowe</option>
            </select>
            <button class="save-btn" onclick="saveTask()">ZAPISZ</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4p-us6hOvGp83VOd-fBOGAXsv41wJ8Is",
            authDomain: "kalendarz-ff379.firebaseapp.com",
            projectId: "kalendarz-ff379",
            storageBucket: "kalendarz-ff379.firebasestorage.app",
            messagingSenderId: "233798983321",
            appId: "1:233798983321:web:f7cfe4d2e179baa87a2208"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selD = new Date(), viewD = new Date(), allTasks = [];

        function start(u) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').classList.add('active');
            document.getElementById('c-ania').checked = (u==='Ania');
            document.getElementById('c-oli').checked = (u==='Oliwier');
            db.collection("tasks").onSnapshot(s => {
                allTasks = [];
                s.forEach(d => allTasks.push({id: d.id, ...d.data()}));
                refresh();
            });
        }

        function refresh() {
            document.getElementById('s-n').innerText = allTasks.filter(t => t.status==='nie').length;
            document.getElementById('s-t').innerText = allTasks.filter(t => t.status==='trwa').length;
            document.getElementById('s-z').innerText = allTasks.filter(t => t.status==='zak').length;

            const grid = document.getElementById('calendar'); grid.innerHTML = '';
            const m = viewD.getMonth(), y = viewD.getFullYear();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('month-name').innerText = `${names[m]} ${y}`;
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const dt = new Date(y, m, d);
                const c = document.createElement('div');
                c.className = 'd-cell' + (dt.toDateString() === selD.toDateString() ? ' active' : '');
                c.innerText = d;
                c.onclick = () => { selD = dt; refresh(); };
                grid.appendChild(c);
            }

            const list = document.getElementById('day-tasks'); list.innerHTML = '';
            document.getElementById('day-label').innerText = selD.toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            allTasks.filter(t => t.date === selD.toISOString().split('T')[0]).forEach(t => list.appendChild(item(t)));
        }

        function item(t) {
            const div = document.createElement('div');
            div.className = 't-item';
            div.innerHTML = `<strong>${t.time || ''} ${t.title}</strong><br><small>${t.who.join(', ')}</small>
            <button onclick="delTask('${t.id}')" style="float:right; border:none; background:none; cursor:pointer">🗑️</button>`;
            return div;
        }

        function showStatus(s) {
            const l = document.getElementById('ov-l'); l.innerHTML = '';
            document.getElementById('ov-t').innerText = s==='nie'?'Czeka':s==='trwa'?'W trakcie':'Gotowe';
            allTasks.filter(t => t.status === s).forEach(t => l.appendChild(item(t)));
            document.getElementById('ov-back').style.display = 'block';
        }

        async function saveTask() {
            const title = document.getElementById('f-title').value;
            if(!title) return;
            const who = [];
            if(document.getElementById('c-ania').checked) who.push('Ania');
            if(document.getElementById('c-oli').checked) who.push('Oliwier');
            await db.collection("tasks").add({
                title, date: selD.toISOString().split('T')[0],
                time: document.getElementById('f-s').value,
                who, status: document.getElementById('f-stat').value
            });
            document.getElementById('f-title').value = '';
        }

        async function delTask(id) { if(confirm("Usunąć?")) await db.collection("tasks").doc(id).delete(); }
        function moveMonth(v) { viewD.setMonth(viewD.getMonth() + v); refresh(); }
    </script>
</body>
</html>
