<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planer Ani i Oliwiera v10</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --primary: #8e44ad;
            --ania-color: #ff7675;
            --oliwier-color: #74b9ff;
            --text: #2d3436;
            --border: #dfe6e9;
            --radius: 20px;
            --status-nie: #ffeaa7;
            --status-trwa: #81ecec;
            --status-zak: #55efc4;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        /* Ekran logowania */
        #loginScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #f0f2f5 0%, #dcdde1 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 50px; border-radius: var(--radius); box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .user-btn { padding: 15px 40px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 20px; color: white; transition: 0.3s; }

        /* Nakładka na zadania (Overlay) */
        #statusOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 3000; padding: 40px 20px; overflow-y: auto;
        }
        .overlay-content { max-width: 800px; margin: 0 auto; background: var(--bg-color); padding: 30px; border-radius: var(--radius); position: relative; }
        .close-overlay { position: absolute; right: 25px; top: 20px; font-size: 30px; cursor: pointer; color: #666; }

        /* Główny kontener */
        .app-container {
            display: none; grid-template-columns: 1fr 420px; gap: 25px; width: 95%; max-width: 1200px;
            background: white; padding: 30px; border-radius: var(--radius); box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* Statystyki */
        .stats-bar { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 25px; grid-column: span 2; }
        .stat-item {
            flex: 1; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold;
            background: white; border-bottom: 4px solid #ddd; cursor: pointer; transition: 0.3s;
        }
        .stat-item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-nie { border-color: #f1c40f; } .stat-trwa { border-color: #3498db; } .stat-zak { border-color: #2ecc71; }
        .stat-count { font-size: 24px; display: block; color: var(--text); }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; }

        /* Kalendarz */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell {
            aspect-ratio: 1.1; border: 1px solid var(--border); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-weight: 600; transition: 0.2s;
        }
        .day-cell.active { background: var(--primary); color: white; border-color: var(--primary); }
        .task-dots { display: flex; gap: 2px; margin-top: 5px; }
        .task-dot { width: 6px; height: 6px; border-radius: 50%; }

        /* Karty zadań */
        .task-card {
            background: white; padding: 20px; margin-bottom: 15px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #8e44ad; position: relative;
        }
        .actions { position: absolute; right: 15px; top: 15px; display: flex; gap: 8px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; opacity: 0.6; }
        .status-badge { font-size: 10px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .badge-nie { background: var(--status-nie); color: #d35400; }
        .badge-trwa { background: var(--status-trwa); color: #008b8b; }
        .badge-zak { background: var(--status-zak); color: #006266; }

        .tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-right: 5px; }
        .tag-Ania { background: #ffecec; color: var(--ania-color); }
        .tag-Oliwier { background: #eaf4ff; color: var(--oliwier-color); }

        /* Formularz */
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .form-box input, .form-box textarea, .form-box select {
            width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }
        .color-picker { display: flex; gap: 10px; margin-bottom: 15px; }
        .color-opt { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-opt.selected { border-color: #333; transform: scale(1.2); }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .logout-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 30px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>Cześć! Kto planuje?</h1>
            <button class="user-btn" style="background:var(--ania-color)" onclick="login('Ania')">Ania</button>
            <button class="user-btn" style="background:var(--oliwier-color)" onclick="login('Oliwier')">Oliwier</button>
        </div>
    </div>

    <div id="statusOverlay">
        <div class="overlay-content">
            <span class="close-overlay" onclick="closeOverlay()">×</span>
            <h2 id="overlayTitle">Zadania</h2>
            <div id="overlayTasks"></div>
        </div>
    </div>

    <button class="logout-btn" onclick="location.reload()">Wyloguj</button>

    <div class="app-container" id="mainApp">
        <div class="stats-bar">
            <div class="stat-item stat-nie" onclick="openStatusView('nie')">
                <span class="stat-count" id="countNie">0</span>
                <span class="stat-label">Nie zaczęte</span>
            </div>
            <div class="stat-item stat-trwa" onclick="openStatusView('trwa')">
                <span class="stat-count" id="countTrwa">0</span>
                <span class="stat-label">W trakcie</span>
            </div>
            <div class="stat-item stat-zak" onclick="openStatusView('zak')">
                <span class="stat-count" id="countZak">0</span>
                <span class="stat-label">Zakończone</span>
            </div>
        </div>

        <div class="calendar-part">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">Poprzedni</button>
                <h2 id="monthDisplay"></h2>
                <button onclick="changeMonth(1)">Następny</button>
            </div>
            <div id="calendarGrid" class="days-grid"></div>
        </div>

        <div class="tasks-part">
            <h2 id="viewDateTitle" style="margin-top:0">Zadania</h2>
            <div id="taskList" class="task-list"></div>

            <div class="form-box">
                <h4 id="formTitle" style="margin:0 0 10px 0">Nowe zadanie</h4>
                <input type="text" id="tTitle" placeholder="Co robimy?">
                
                <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 11px; color: #666; margin-left: 5px;">Od:</label>
                        <input type="time" id="tTime" style="margin-bottom: 0;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 11px; color: #666; margin-left: 5px;">Do:</label>
                        <input type="time" id="tEndTime" style="margin-bottom: 0;">
                    </div>
                </div>

                <input type="text" id="tLoc" placeholder="Gdzie?">
                <textarea id="tDesc" placeholder="Szczegóły..." rows="2"></textarea>
                
                <div class="color-picker" id="colorPicker">
                    <div class="color-opt selected" style="background:#8e44ad" data-color="#8e44ad"></div>
                    <div class="color-opt" style="background:#e67e22" data-color="#e67e22"></div>
                    <div class="color-opt" style="background:#27ae60" data-color="#27ae60"></div>
                    <div class="color-opt" style="background:#2980b9" data-color="#2980b9"></div>
                    <div class="color-opt" style="background:#e84393" data-color="#e84393"></div>
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <label style="cursor:pointer"><input type="checkbox" id="pAnia"> Ania</label>
                    <label style="cursor:pointer"><input type="checkbox" id="pOliwier"> Oliwier</label>
                </div>

                <select id="tStatus">
                    <option value="nie">Status: Nie zaczęte</option>
                    <option value="trwa">Status: W trakcie</option>
                    <option value="zak">Status: Zakończone</option>
                </select>
                <button class="btn-save" id="submitBtn" onclick="handleSubmit()">Zapisz zadanie</button>
                <button id="cancelBtn" onclick="cancelEdit()" style="display:none; width:100%; background:#ccc; border:none; padding:10px; border-radius:10px; margin-top:5px; cursor:pointer">Anuluj edycję</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let selectedDate = new Date();
        let viewDate = new Date();
        let tasks = JSON.parse(localStorage.getItem('shared_tasks_v11')) || [];
        let editId = null;
        let selectedColor = "#8e44ad";

        function login(user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'grid';
            resetForm(); renderAll();
        }

        function formatDate(date) { return date.toISOString().split('T')[0]; }

        function renderAll() {
            renderCalendar();
            renderTasks();
            updateStats();
        }

        function updateStats() {
            document.getElementById('countNie').innerText = tasks.filter(t => t.status === 'nie').length;
            document.getElementById('countTrwa').innerText = tasks.filter(t => t.status === 'trwa').length;
            document.getElementById('countZak').innerText = tasks.filter(t => t.status === 'zak').length;
        }

        function openStatusView(status) {
            const container = document.getElementById('overlayTasks');
            const titles = { 'nie': 'Zadania nie zaczęte', 'trwa': 'Zadania w trakcie', 'zak': 'Zadania zakończone' };
            document.getElementById('overlayTitle').innerText = titles[status];
            container.innerHTML = '';
            
            const filtered = tasks.filter(t => t.status === status).sort((a,b) => a.date.localeCompare(b.date));
            if(filtered.length === 0) container.innerHTML = "<p>Brak zadań w tej sekcji.</p>";

            filtered.forEach(t => {
                const div = createTaskCard(t);
                container.appendChild(div);
            });
            document.getElementById('statusOverlay').style.display = 'block';
        }

        function closeOverlay() { document.getElementById('statusOverlay').style.display = 'none'; }

        function createTaskCard(t) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.style.borderLeftColor = t.color;
            if(t.status === 'zak') div.style.opacity = "0.7";

            const timeRange = t.time ? (t.endTime ? `${t.time} – ${t.endTime}` : t.time) : 'Cały dzień';
            const mapBtn = t.location ? `<button class="action-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.location)}', '_blank')">📍</button>` : '';

            div.innerHTML = `
                <div class="actions">
                    ${mapBtn}
                    <button class="action-btn" onclick="editTask('${t.id}')">✏️</button>
                    <button class="action-btn" onclick="deleteTask('${t.id}')">🗑️</button>
                </div>
                <small style="color:#888">${t.date} | ${timeRange}</small>
                <div style="font-weight:bold; font-size:1.1em; margin:5px 0">${t.title}</div>
                <p style="font-size:13px; margin:5px 0; color:#444">${t.desc || ''}</p>
                <div style="margin-top:10px">
                    ${t.who.map(p => `<span class="tag tag-${p}">${p}</span>`).join('')}
                    <span class="status-badge badge-${t.status}">${t.status}</span>
                </div>
            `;
            return div;
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            const dayTasks = tasks.filter(t => t.date === formatDate(selectedDate))
                                  .sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99"));
            
            document.getElementById('viewDateTitle').innerText = selectedDate.toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
            dayTasks.forEach(t => list.appendChild(createTaskCard(t)));
        }

        function handleSubmit() {
            const title = document.getElementById('tTitle').value;
            if(!title) return alert("Wpisz tytuł!");

            const who = [];
            if(document.getElementById('pAnia').checked) who.push('Ania');
            if(document.getElementById('pOliwier').checked) who.push('Oliwier');

            const taskData = {
                id: editId || Date.now().toString(),
                date: formatDate(selectedDate),
                time: document.getElementById('tTime').value,
                endTime: document.getElementById('tEndTime').value, // NOWE POLE
                title: title,
                location: document.getElementById('tLoc').value,
                desc: document.getElementById('tDesc').value,
                status: document.getElementById('tStatus').value,
                color: selectedColor,
                who: who
            };

            if(editId) {
                const idx = tasks.findIndex(t => t.id === editId);
                tasks[idx] = taskData;
            } else {
                tasks.push(taskData);
            }

            localStorage.setItem('shared_tasks_v11', JSON.stringify(tasks));
            cancelEdit(); closeOverlay(); renderAll();
        }

        function editTask(id) {
            const t = tasks.find(x => x.id === id);
            editId = id;
            selectedDate = new Date(t.date);
            document.getElementById('tTitle').value = t.title;
            document.getElementById('tTime').value = t.time;
            document.getElementById('tEndTime').value = t.endTime || ''; // EDYCJA NOWEGO POLA
            document.getElementById('tLoc').value = t.location;
            document.getElementById('tDesc').value = t.desc;
            document.getElementById('tStatus').value = t.status;
            document.getElementById('pAnia').checked = t.who.includes('Ania');
            document.getElementById('pOliwier').checked = t.who.includes('Oliwier');
            selectedColor = t.color;
            
            document.querySelectorAll('.color-opt').forEach(o => o.classList.toggle('selected', o.dataset.color === selectedColor));
            document.getElementById('formTitle').innerText = "Edytuj zadanie";
            document.getElementById('submitBtn').innerText = "Zaktualizuj";
            document.getElementById('cancelBtn').style.display = 'block';
            closeOverlay();
        }

        function deleteTask(id) {
            if(confirm("Usunąć?")) {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('shared_tasks_v11', JSON.stringify(tasks));
                renderAll(); closeOverlay();
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const m = viewDate.getMonth(); const y = viewDate.getFullYear();
            const names = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('monthDisplay').innerText = `${names[m]} ${y}`;
            
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const days = new Date(y, m + 1, 0).getDate();

            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const date = new Date(y, m, d);
                const dateStr = formatDate(date);
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (dateStr === formatDate(selectedDate) ? ' active' : '');
                cell.innerHTML = `<span>${d}</span>`;
                
                const dayTasks = tasks.filter(t => t.date === dateStr);
                if(dayTasks.length > 0) {
                    const dots = document.createElement('div');
                    dots.className = 'task-dots';
                    dayTasks.slice(0, 3).forEach(t => {
                        const dot = document.createElement('div');
                        dot.className = 'task-dot';
                        dot.style.background = t.color;
                        dots.appendChild(dot);
                    });
                    cell.appendChild(dots);
                }
                cell.onclick = () => { selectedDate = date; renderAll(); };
                grid.appendChild(cell);
            }
        }

        function resetForm() {
            document.getElementById('tTitle').value = '';
            document.getElementById('tTime').value = '';
            document.getElementById('tEndTime').value = ''; // RESET
            document.getElementById('tLoc').value = '';
            document.getElementById('tDesc').value = '';
            document.getElementById('pAnia').checked = (currentUser === 'Ania');
            document.getElementById('pOliwier').checked = (currentUser === 'Oliwier');
        }

        function cancelEdit() {
            editId = null; resetForm();
            document.getElementById('formTitle').innerText = "Nowe zadanie";
            document.getElementById('submitBtn').innerText = "Zapisz zadanie";
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderAll(); }

        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedColor = opt.dataset.color;
            };
        });
    </script>
</body>
</html>
